name: XMind to Testlink XML Converter

on:
  push:
    branches:
      - main
    paths:
      - '**.xmind'
  
  # Permite o disparo manual do workflow
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de execução'
        required: true
        default: 'changed'
        type: choice
        options:
          - changed # Processa apenas arquivos alterados (padrão para push)
          - all     # Processa todos os arquivos .xmind no repositório

jobs:
  convert_xmind:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install xmind2testlink

      # Passo para identificar arquivos alterados (usado no modo 'changed')
      - name: Get changed XMind files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **/*.xmind

      # ----------------------------------------------------------------------
      # Lógica de Conversão
      # ----------------------------------------------------------------------
      - name: Convert XMind files to Testlink XML
        run: |
          MODE="${{ github.event.inputs.mode || 'changed' }}"
          
          if [ "$MODE" == "all" ]; then
            echo "Modo: ALL - Processando todos os arquivos .xmind no repositório."
            FILES_TO_PROCESS=$(find . -name "*.xmind" -print)
          elif [ "$MODE" == "changed" ] && [ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]; then
            echo "Modo: CHANGED - Processando apenas arquivos alterados."
            FILES_TO_PROCESS="${{ steps.changed-files.outputs.all_changed_files }}"
          else
            echo "Nenhum arquivo .xmind para processar neste push/disparo."
            exit 0
          fi
          
          # Loop para converter cada arquivo
          for file in $FILES_TO_PROCESS; do
            if [[ "$file" == *.xmind ]]; then
              echo "Convertendo $file para XML..."
              # Executa a conversão
              xmind2testlink "$file"
            fi
          done

      - name: Commit and Push generated XML files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "CI: Gerado(s) arquivo(s) XML do Testlink a partir do(s) XMind(s) alterado(s)"
          # O arquivo XML é gerado no mesmo diretório do XMind
          file_pattern: '**/*.xml'
          # Garante que apenas os arquivos XML sejam comitados
          commit_options: '--no-verify --allow-empty'

      - name: Upload XML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testlink-xml-files
          path: |
            **/*.xml
            !node_modules
            !.git