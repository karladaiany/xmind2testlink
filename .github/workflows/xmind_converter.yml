name: XMind to Testlink XML Converter

on:
  push:
    branches:
      - main
  
  # Permite o disparo manual do workflow (sem inputs, pois a lógica de pastas unifica a execução)
  workflow_dispatch:

jobs:
  convert_xmind:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install xmind2testlink

      - name: Create 'converted' directory
        run: mkdir -p converted

      # ----------------------------------------------------------------------
      # Lógica de Conversão: Processa TODOS os .xmind na pasta 'convert'
      # ----------------------------------------------------------------------
      - name: Convert XMind files in 'convert' folder to Testlink XML
        run: |
          # Verifica se a pasta 'convert' existe
          if [ ! -d "convert" ]; then
            echo "A pasta 'convert' não existe. Nenhum arquivo para processar."
            exit 0
          fi
          
          # Loop para converter cada arquivo .xmind na pasta 'convert'
          for file_path in convert/*.xmind; do
            # Verifica se o arquivo existe (para evitar erro se a pasta estiver vazia)
            if [ -f "$file_path" ]; then
              echo "Processando $file_path..."
              
              # 1. Executa a conversão. O XML é gerado na mesma pasta 'convert'.
              xmind2testlink "$file_path"
              
              # 2. Define o nome base do arquivo (sem o caminho 'convert/')
              file_name=$(basename "$file_path")
              
              # 3. Move o ARQUIVO .xmind original para a pasta 'converted'
              mv "$file_path" "converted/$file_name"
              echo "Movido $file_name para 'converted/'"
            fi
          done

      - name: Move generated XML files to 'converted' folder
        run: |
          # Move todos os arquivos .xml da pasta 'convert' para a pasta 'converted'
          find convert -maxdepth 1 -name "*.xml" -exec mv {} converted/ \;
          
          # Verifica se algum arquivo foi movido (apenas para log)
          if [ "$(find converted -maxdepth 1 -name "*.xml" | wc -l)" -gt 0 ]; then
            echo "Arquivos XML gerados e movidos com sucesso para a pasta 'converted'."
          else
            echo "Nenhum arquivo XML gerado para mover."
          fi

          # Garante que a pasta 'convert' fique vazia após a conversão
          find convert -maxdepth 1 -name "*.xmind" -exec rm {} \;

      - name: Commit and Push generated XML files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "CI: Concluída a conversão. Arquivos movidos para 'converted/'."
          file_pattern: 'converted/*'
          commit_options: '--no-verify --allow-empty'

      - name: Upload XML artifacts 
        uses: actions/upload-artifact@v4
        with:
          name: testlink-xml-files
          path: converted/
