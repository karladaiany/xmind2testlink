name: XMind to Testlink XML Converter

on:
  push:
    branches:
      - main
    paths:
      - '**.xmind'

jobs:
  convert_xmind:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install xmind2testlink

      - name: Get changed XMind files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            **/*.xmind

      - name: Convert changed XMind files to Testlink XML
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Arquivos XMind alterados: ${{ steps.changed-files.outputs.all_changed_files }}"
          
          # Loop para converter cada arquivo XMind alterado
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == *.xmind ]]; then
              echo "Convertendo $file para XML..."
              # Executa a conversão
              xmind2testlink "$file"
              
              # O arquivo XML é gerado no mesmo diretório do XMind
            fi
          done

      - name: Commit and Push generated XML files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "CI: Gerado(s) arquivo(s) XML do Testlink a partir do(s) XMind(s) alterado(s)"
          # O arquivo XML tem o mesmo nome do XMind, mas com extensão .xml
          file_pattern: '**/*.xml'
          # Garante que apenas os arquivos XML sejam comitados
          commit_options: '--no-verify --allow-empty'

      - name: Upload XML artifacts (Opcional: para download direto do pipeline)
        uses: actions/upload-artifact@v4
        with:
          name: testlink-xml-files
          path: |
            **/*.xml
            !node_modules
            !.git
